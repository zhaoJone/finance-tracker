services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-tracker-postgres
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: finance-tracker-backend:latest
    container_name: finance-tracker-backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:mysecretpassword@postgres:5432/finance_tracker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: finance-tracker-frontend:latest
    container_name: finance-tracker-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "8080:80"
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
